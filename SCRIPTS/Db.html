<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontakt oss</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: #fff;
            border: 1px solid #e0e0d8;
            border-radius: 12px;
            padding: 2rem 2.5rem;
            width: 100%;
            max-width: 520px;
        }

        h1 {
            font-size: 26px;
            font-weight: 400;
            margin-bottom: 0.25rem;
            color: #1a1a1a;
        }

        .sub {
            font-size: 14px;
            color: #666;
            margin-bottom: 2rem;
        }

        .field {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
            letter-spacing: 0.03em;
        }

        input[type=text],
        input[type=email],
        textarea {
            width: 100%;
            border: 1px solid #d0d0c8;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 15px;
            font-family: inherit;
            background: #fafaf8;
            color: #1a1a1a;
            transition: border-color 0.15s;
            outline: none;
            resize: none;
        }

        input:focus,
        textarea:focus {
            border-color: #888;
            box-shadow: 0 0 0 3px rgba(100, 100, 100, 0.08);
        }

        textarea {
            height: 110px;
            line-height: 1.6;
        }

        .send-btn {
            width: 100%;
            padding: 11px;
            border: 1px solid #d0d0c8;
            border-radius: 8px;
            background: #fff;
            color: #1a1a1a;
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.15s, transform 0.1s;
            margin-top: 1.5rem;
        }

        .send-btn:hover {
            background: #f5f5f0;
        }

        .send-btn:active {
            transform: scale(0.98);
        }

        .success {
            display: none;
            text-align: center;
            padding: 2rem 0 1rem;
        }

        .success i {
            font-size: 40px;
            color: #3a9e75;
            display: block;
            margin-bottom: 12px;
        }

        .success p {
            font-size: 15px;
            color: #555;
        }

        .success strong {
            color: #1a1a1a;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Kontakt oss</h1>
        <p class="sub">Fyll ut skjemaet, så svarer vi så snart vi kan.</p>

        <div id="form-area">
            <div class="field">
                <label for="navn">Navn</label>
                <input type="text" id="navn" placeholder="Ola Nordmann" autocomplete="name" />
            </div>
            <div class="field">
                <label for="epost">E-post</label>
                <input type="email" id="epost" placeholder="ola@eksempel.no" autocomplete="email" />
            </div>
            <div class="field">
                <label for="melding">Melding</label>
                <textarea id="melding" placeholder="Skriv meldingen din her…"></textarea>
            </div>
            <button class="send-btn" onclick="sendSkjema()">
                <i class="ti ti-send"></i> Send melding
            </button>
        </div>

        <div class="success" id="success">
            <i class="ti ti-circle-check"></i>
            <p><strong>Takk!</strong> Meldingen din er sendt.</p>
        </div>
    </div>

    <script>
    function sendSkjema() {
      const navn = document.getElementById('navn').value.trim();
      const epost = document.getElementById('epost').value.trim();
      const melding = document.getElementById('melding').value.trim();
      if (!navn || !epost || !melding) {
        alert('Vennligst fyll ut alle feltene.');
        return;
      }
      document.getElementById('form-area').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    }
    </script>
</body>

</html>
