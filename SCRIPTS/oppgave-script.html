<!DOCTYPE html>
<html>
  <head>
    <title>Løkke</title>
    <style>
      /* output container styled as flex row */
      #loop1 {
        margin-top: 15px;
        display: flex;
        flex-wrap: wrap;
        background-color: aqua;
        padding: 4px;
      }

      .number {
        margin-right: 8px;
      }

      #controls {
        margin-bottom: 8px;
      }
    </style>

    <script>
      function oppstart() {
        const output = document.getElementById("loop1");
        output.textContent = ""; // clear previous numbers

        const maxInput = document.getElementById("max");
        const max = parseInt(maxInput.value, 10) || 0;

        for (let i = 0; i < max; i += 2) {
          console.log(i);
          const span = document.createElement("span");
          span.textContent = i;
          span.className = "number";
          output.appendChild(span);
        }
      }
    </script>
  </head>

  <body>
    <h1>Løkke</h1>

    <div id="controls">
      <label for="max">Maksimum:</label>
      <input type="number" id="max" value="100" min="0" step="2" />
      <button onclick="oppstart()">Start</button>
    </div>

    <div id="loop1"></div>
  </body>
</html>
